name: PR Gate

# Runs on every PR targeting main.
# Pipeline: detect-changes → tests + lint → review-agent → auto-merge
#
# Path filtering strategy:
#   The `changes` job (dorny/paths-filter) detects which area of the
#   monorepo a PR touches and emits boolean outputs (engine, data,
#   frontend, harness). Each downstream job ALWAYS runs (so the status
#   check still reports SUCCESS — important for branch protection and
#   the orchestrator's merge-poll logic), but its steps are gated on
#   the relevant output. When nothing in scope changed, the job skips
#   the heavy install + test work and exits clean in seconds instead
#   of minutes. This is the cheap way to cut CI minutes without
#   restructuring the repo.

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  # ── Stage 0: Detect which areas of the monorepo changed ──────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      engine: ${{ steps.filter.outputs.engine }}
      data: ${{ steps.filter.outputs.data }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # When workflow files themselves change, run everything —
          # the safest default for CI plumbing changes. Same for
          # pyproject.toml, which affects every Python install path.
          filters: |
            engine:
              - 'the_similarity/**'
              - 'pyproject.toml'
              - 'poetry.lock'
              - 'scripts/ci_local.sh'
              - '.github/workflows/pr-gate.yml'
              - '.github/workflows/main-health.yml'
            data:
              - 'the-similarity-data/**'
              - '.github/workflows/pr-gate.yml'
            frontend:
              - 'the-similarity-app/**'
              - '.github/workflows/pr-gate.yml'

  # ── Stage 1: Tests ────────────────────────────────────────────────
  python-tests:
    name: Python Tests
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: Skip notice
        if: needs.changes.outputs.engine != 'true'
        run: echo "No engine paths changed — skipping engine tests."

      - uses: actions/checkout@v4
        if: needs.changes.outputs.engine == 'true'

      - uses: actions/setup-python@v5
        if: needs.changes.outputs.engine == 'true'
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        if: needs.changes.outputs.engine == 'true'
        run: |
          pip install poetry-core
          pip install -e .
          pip install pytest pytest-cov

      - name: Run engine tests
        if: needs.changes.outputs.engine == 'true'
        run: python -m pytest the_similarity/tests/ -v

  data-tests:
    name: Data Package Tests
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: Skip notice
        if: needs.changes.outputs.data != 'true'
        run: echo "No data-package paths changed — skipping data tests."

      - uses: actions/checkout@v4
        if: needs.changes.outputs.data == 'true'

      - uses: actions/setup-python@v5
        if: needs.changes.outputs.data == 'true'
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        if: needs.changes.outputs.data == 'true'
        run: |
          pip install poetry-core
          pip install -e the-similarity-data/
          pip install pytest

      - name: Run tests
        if: needs.changes.outputs.data == 'true'
        run: python -m pytest the-similarity-data/tests/ -v

  frontend-tests:
    name: Frontend Tests
    needs: changes
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: the-similarity-app
    steps:
      - name: Skip notice
        if: needs.changes.outputs.frontend != 'true'
        # `working-directory` default doesn't apply to `run` steps that
        # don't actually run anything heavy, but echo still respects it.
        # Use `working-directory: .` so this works even if the dir is
        # absent on a non-frontend PR (it isn't, but defensive).
        working-directory: .
        run: echo "No frontend paths changed — skipping frontend tests."

      - uses: actions/checkout@v4
        if: needs.changes.outputs.frontend == 'true'

      - uses: actions/setup-node@v4
        if: needs.changes.outputs.frontend == 'true'
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: the-similarity-app/package-lock.json

      - name: Install dependencies
        if: needs.changes.outputs.frontend == 'true'
        run: npm ci

      - name: Lint
        if: needs.changes.outputs.frontend == 'true'
        run: npm run lint

      - name: Run tests
        if: needs.changes.outputs.frontend == 'true'
        run: npm run test

      - name: Build check
        if: needs.changes.outputs.frontend == 'true'
        run: npm run build

  python-lint:
    name: Python Lint
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: Skip notice
        if: needs.changes.outputs.engine != 'true'
        run: echo "No engine paths changed — skipping ruff."

      - uses: actions/checkout@v4
        if: needs.changes.outputs.engine == 'true'

      - uses: actions/setup-python@v5
        if: needs.changes.outputs.engine == 'true'
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install linters
        if: needs.changes.outputs.engine == 'true'
        run: pip install ruff

      - name: Ruff check
        if: needs.changes.outputs.engine == 'true'
        run: ruff check the_similarity/ --output-format=github

      - name: Ruff format check
        if: needs.changes.outputs.engine == 'true'
        run: ruff format --check the_similarity/

  # ── Stage 2: Review Agent ─────────────────────────────────────────
  review-agent:
    name: Review Agent
    needs: [python-tests, data-tests, frontend-tests, python-lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          DIFF=$(git diff origin/main...HEAD -- . ':!*.lock' ':!*.json' | head -c 60000)
          echo "diff<<DIFF_EOF" >> "$GITHUB_OUTPUT"
          echo "$DIFF" >> "$GITHUB_OUTPUT"
          echo "DIFF_EOF" >> "$GITHUB_OUTPUT"

      - name: Get PR info
        id: pr
        run: |
          echo "title=${{ github.event.pull_request.title }}" >> "$GITHUB_OUTPUT"
          echo "body<<BODY_EOF" >> "$GITHUB_OUTPUT"
          echo "${{ github.event.pull_request.body }}" >> "$GITHUB_OUTPUT"
          echo "BODY_EOF" >> "$GITHUB_OUTPUT"
          echo "files_changed=$(git diff --name-only origin/main...HEAD | wc -l)" >> "$GITHUB_OUTPUT"

      - name: Review with Claude
        id: review
        uses: anthropics/anthropic-ai-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-20250514
          max_tokens: 4096
          prompt: |
            You are a senior code reviewer for "The Similarity" — a time-series pattern matching engine.
            Review this PR and decide: APPROVE or REQUEST_CHANGES.

            ## Rules
            - APPROVE if: tests passed (they did — you're only called after tests pass), code is reasonable, no obvious bugs or security issues.
            - REQUEST_CHANGES only if: security vulnerability, data loss risk, obvious logic bug, or broken API contract.
            - Be pragmatic. Style nits and minor refactors are NOT grounds for rejection.
            - For agent-generated code: trust the test suite. If tests pass, bias toward APPROVE.

            ## PR
            Title: ${{ steps.pr.outputs.title }}
            Files changed: ${{ steps.pr.outputs.files_changed }}

            Body:
            ${{ steps.pr.outputs.body }}

            ## Diff
            ```diff
            ${{ steps.diff.outputs.diff }}
            ```

            Respond in this exact format:
            DECISION: APPROVE or REQUEST_CHANGES
            SUMMARY: One paragraph summary of what this PR does.
            ISSUES: Bullet list of issues (or "None" if approving).

      - name: Parse review decision
        id: decision
        run: |
          RESPONSE='${{ steps.review.outputs.response }}'
          if echo "$RESPONSE" | grep -q "DECISION: APPROVE"; then
            echo "verdict=approve" >> "$GITHUB_OUTPUT"
          else
            echo "verdict=request_changes" >> "$GITHUB_OUTPUT"
          fi
          # Extract summary for the PR comment
          echo "response<<RESP_EOF" >> "$GITHUB_OUTPUT"
          echo "$RESPONSE" >> "$GITHUB_OUTPUT"
          echo "RESP_EOF" >> "$GITHUB_OUTPUT"

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            const verdict = '${{ steps.decision.outputs.verdict }}';
            const response = `${{ steps.decision.outputs.response }}`.replace(/`/g, '\\`');
            const event = verdict === 'approve' ? 'APPROVE' : 'REQUEST_CHANGES';

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              event: event,
              body: `## Review Agent\n\n${response}`
            });

  # ── Stage 3: Auto-merge on approval ──────────────────────────────
  auto-merge:
    name: Auto-merge
    needs: [review-agent]
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Enable auto-merge
        uses: actions/github-script@v7
        with:
          script: |
            // Only merge if the review-agent approved
            const reviews = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });

            const agentApproved = reviews.data.some(
              r => r.state === 'APPROVED' && r.body?.includes('Review Agent')
            );

            if (!agentApproved) {
              core.info('Review agent did not approve — skipping merge');
              return;
            }

            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              merge_method: 'squash',
            });

            core.info(`PR #${context.payload.pull_request.number} auto-merged`);
