name: CI

# Post-merge smoke tests on `main`. Mirrors pr-gate's path-filter
# pattern: each job runs but skips heavy work when its scope didn't
# change. Keeps job names stable for any external dashboards while
# avoiding redundant work after every merge.

on:
  push:
    branches: [main]

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      engine: ${{ steps.filter.outputs.engine }}
      data: ${{ steps.filter.outputs.data }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # On push, paths-filter compares against the previous commit
          # on the branch — so a single squash-merge commit will list
          # everything the PR touched. Workflow-file edits are always
          # treated as "everything changed" via the wildcards below.
          filters: |
            engine:
              - 'the_similarity/**'
              - 'pyproject.toml'
              - 'poetry.lock'
              - '.github/workflows/ci.yml'
            data:
              - 'the-similarity-data/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'the-similarity-app/**'
              - '.github/workflows/ci.yml'

  python-tests:
    name: Python Tests
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: Skip notice
        if: needs.changes.outputs.engine != 'true'
        run: echo "No engine paths changed in this push — skipping engine tests."

      - uses: actions/checkout@v4
        if: needs.changes.outputs.engine == 'true'

      - uses: actions/setup-python@v5
        if: needs.changes.outputs.engine == 'true'
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        if: needs.changes.outputs.engine == 'true'
        run: |
          pip install poetry-core
          pip install -e .
          pip install pytest pytest-cov

      - name: Run engine tests
        if: needs.changes.outputs.engine == 'true'
        run: python -m pytest the_similarity/tests/ -v

  data-tests:
    name: Data Package Tests
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: Skip notice
        if: needs.changes.outputs.data != 'true'
        run: echo "No data-package paths changed — skipping data tests."

      - uses: actions/checkout@v4
        if: needs.changes.outputs.data == 'true'

      - uses: actions/setup-python@v5
        if: needs.changes.outputs.data == 'true'
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        if: needs.changes.outputs.data == 'true'
        run: |
          pip install poetry-core
          pip install -e the-similarity-data/
          pip install pytest

      - name: Run tests
        if: needs.changes.outputs.data == 'true'
        run: python -m pytest the-similarity-data/tests/ -v

  frontend-tests:
    name: Frontend Tests
    needs: changes
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: the-similarity-app
    steps:
      - name: Skip notice
        if: needs.changes.outputs.frontend != 'true'
        working-directory: .
        run: echo "No frontend paths changed — skipping frontend tests."

      - uses: actions/checkout@v4
        if: needs.changes.outputs.frontend == 'true'

      - uses: actions/setup-node@v4
        if: needs.changes.outputs.frontend == 'true'
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: the-similarity-app/package-lock.json

      - name: Install dependencies
        if: needs.changes.outputs.frontend == 'true'
        run: npm ci

      - name: Run tests
        if: needs.changes.outputs.frontend == 'true'
        run: npm run test

      - name: Build check
        if: needs.changes.outputs.frontend == 'true'
        run: npm run build
