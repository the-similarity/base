id: jepa-retrieval-core-v1
title: JEPA retrieval-only pilot for The Similarity
status: active
owner: research
objective: >-
  Evaluate whether a frozen JEPA-style encoder improves analog retrieval quality and
  downstream walk-forward quality before any production integration.

lane_type: retrieval_enrichment

writable_scope:
  allowed:
    - research/autoresearch/
    - progress/autoresearch/
    - research/
    - the-similarity-playground/
    - the_similarity/examples/
  forbidden:
    - the_similarity/core/backtester.py
    - the_similarity/api.py
    - pyproject.toml
    - the-similarity-data/manifests/catalog.json
    - docs/reference/API_REFERENCE.md

benchmark:
  dataset_family: univariate historical price series
  canonical_slices:

    # ── equities-daily-core ──────────────────────────────────────────────
    # Liquid US large-cap equities and major ETFs.  Daily closes from Stooq.
    # Covers secular bull, correction, and sideways regimes across ~15-40 yrs.
    - id: equities-daily-core
      description: Daily closes on liquid large-cap equities with mixed trend and mean-reverting periods.
      timeframe: 1d
      source: stooq
      symbols:
        - {symbol: aapl,  path: data/stocks/aapl/1d.parquet,  start_date: "1984-09-07", end_date: "2026-03-20", rows: 10464}
        - {symbol: amzn,  path: data/stocks/amzn/1d.parquet,  start_date: "1997-05-16", end_date: "2026-03-20", rows: 7251}
        - {symbol: dia,   path: data/stocks/dia/1d.parquet,   start_date: "2005-02-25", end_date: "2026-03-20", rows: 5299}
        - {symbol: goog,  path: data/stocks/goog/1d.parquet,  start_date: "2014-03-27", end_date: "2026-03-20", rows: 3014}
        - {symbol: iwm,   path: data/stocks/iwm/1d.parquet,   start_date: "2005-02-25", end_date: "2026-03-20", rows: 5299}
        - {symbol: meta,  path: data/stocks/meta/1d.parquet,  start_date: "2012-05-18", end_date: "2026-03-20", rows: 3479}
        - {symbol: msft,  path: data/stocks/msft/1d.parquet,  start_date: "1986-03-13", end_date: "2026-03-20", rows: 10081}
        - {symbol: nvda,  path: data/stocks/nvda/1d.parquet,  start_date: "1999-01-22", end_date: "2026-03-20", rows: 6831}
        - {symbol: qqq,   path: data/stocks/qqq/1d.parquet,   start_date: "1999-03-10", end_date: "2026-03-20", rows: 6799}
        - {symbol: spy,   path: data/stocks/spy/1d.parquet,   start_date: "2005-02-25", end_date: "2026-03-20", rows: 5299}
        - {symbol: tsla,  path: data/stocks/tsla/1d.parquet,  start_date: "2010-06-28", end_date: "2026-03-20", rows: 3956}

    # ── crypto-daily-core ────────────────────────────────────────────────
    # Major crypto pairs (USDT-quoted) at daily resolution from CCXT.
    # Higher volatility than equities — tests uncertainty width and
    # calibration under fat tails.
    - id: crypto-daily-core
      description: Daily closes on major crypto assets for higher-volatility regime coverage.
      timeframe: 1d
      source: ccxt
      symbols:
        - {symbol: btc_usdt, path: data/crypto/btc_usdt/1d.parquet, start_date: "2019-09-23", end_date: "2026-03-23", rows: 2374}
        - {symbol: eth_usdt, path: data/crypto/eth_usdt/1d.parquet, start_date: "2019-09-23", end_date: "2026-03-23", rows: 2374}
        - {symbol: sol_usdt, path: data/crypto/sol_usdt/1d.parquet, start_date: "2020-09-18", end_date: "2026-03-23", rows: 2013}
        - {symbol: xrp_usdt, path: data/crypto/xrp_usdt/1d.parquet, start_date: "2019-09-23", end_date: "2026-03-23", rows: 1463}

    # ── stress-regimes-core ──────────────────────────────────────────────
    # Hand-picked crisis and regime-transition windows.  Used to verify
    # that retrieval and projection stay calibrated under tail events.
    # Each window is a date sub-range of a symbol already in one of the
    # slices above — the benchmark runner should filter the parquet to
    # [stress_start, stress_end] before sampling trials.
    - id: stress-regimes-core
      description: Crisis and transition windows to test novelty handling and calibration under instability.
      windows:
        # COVID-19 crash: rapid ~35 % drawdown in equities, Mar 2020
        - label: covid-crash-equities
          symbol: spy
          path: data/stocks/spy/1d.parquet
          stress_start: "2020-02-19"
          stress_end: "2020-04-30"
          rationale: >-
            Fastest 30 % drawdown in S&P history. Tests whether the matcher
            retrieves meaningful analogues for an unprecedented velocity move
            and whether the cone opens wide enough.

        - label: covid-crash-tech
          symbol: qqq
          path: data/stocks/qqq/1d.parquet
          stress_start: "2020-02-19"
          stress_end: "2020-04-30"
          rationale: Tech concentrated drawdown and V-shaped recovery.

        # 2022 crypto winter: BTC lost ~75 % from Nov-2021 ATH
        - label: crypto-winter-2022-btc
          symbol: btc_usdt
          path: data/crypto/btc_usdt/1d.parquet
          stress_start: "2021-11-01"
          stress_end: "2022-07-31"
          rationale: >-
            Prolonged drawdown with multiple capitulation events (LUNA, 3AC).
            Tests calibration under sustained negative drift and vol clustering.

        - label: crypto-winter-2022-eth
          symbol: eth_usdt
          path: data/crypto/eth_usdt/1d.parquet
          stress_start: "2021-11-01"
          stress_end: "2022-07-31"
          rationale: ETH parallel to BTC crypto winter with merge-narrative divergence.

        # 2022 rate-hike equity bear market
        - label: rate-hike-bear-2022
          symbol: spy
          path: data/stocks/spy/1d.parquet
          stress_start: "2022-01-03"
          stress_end: "2022-10-14"
          rationale: >-
            Grinding bear driven by Fed tightening. Unlike COVID, slow and
            persistent — tests analogues for a different volatility signature.

        # Growth-stock crash 2022 (TSLA -65 % peak-to-trough)
        - label: growth-crash-2022-tsla
          symbol: tsla
          path: data/stocks/tsla/1d.parquet
          stress_start: "2021-11-01"
          stress_end: "2022-12-31"
          rationale: Extreme single-name drawdown in a liquid mega-cap.

        # 2020 oil price war + negative WTI futures
        - label: oil-price-war-2020
          symbol: spy
          path: data/stocks/spy/1d.parquet
          stress_start: "2020-03-01"
          stress_end: "2020-05-15"
          rationale: >-
            Overlaps COVID but captures the unique commodity dislocation
            reflected in broad-market stress.

  query_window: 60
  forward_bars: 30
  top_k: 10
  n_trials: 100
  seeds:
    - 42
    - 314
  evaluation_api: the_similarity.api.backtest
  no_lookahead_required: true

scorecard:
  primary_metrics:
    - name: crps
      direction: lower_is_better
    - name: calibration_error_p10_p90
      direction: lower_is_better
  secondary_metrics:
    - name: hit_rate
      direction: higher_is_better
    - name: mean_error
      direction: lower_is_better
    - name: runtime_seconds
      direction: lower_is_better
  retrieval_metrics:
    - name: top_k_overlap_vs_baseline
      direction: descriptive
    - name: rank_lift_for_known_good_matches
      direction: higher_is_better

acceptance:
  keep_if:
    - condition: primary scorecard improves on at least one canonical slice with no severe regression on others
    - condition: calibration_error_p10_p90 does not worsen by more than 0.02 absolute on any slice
    - condition: runtime increase remains within agreed budget for the lane
  discard_if:
    - condition: crps worsens and no compensating calibration improvement is observed
    - condition: retrieval lift is anecdotal only and walk-forward metrics do not improve
    - condition: experiment changes evaluator behavior instead of model behavior

# ── Numeric decision thresholds ──────────────────────────────────────
# Two agents reading the same before/after metrics MUST reach the same
# keep/discard verdict using these gates.  All values are absolute
# unless noted.  Baseline reference (smoke):
#   CRPS ~0.339, calibration_error ~0.50, hit_rate ~0.0, runtime ~3.7s
# Full-scale baseline target (when available):
#   CRPS ~0.1769, calibration_error ~0.0475, hit_rate ~0.49, runtime ~1792s
thresholds:
  # Minimum absolute CRPS reduction (before - after) to count as an
  # improvement.  Values below this are noise, not signal.
  min_crps_improvement: 0.005

  # Maximum absolute increase in calibration_error_p10_p90 that is
  # tolerable.  Any regression larger than this triggers DISCARD even
  # if CRPS improves.
  max_calibration_regression: 0.02

  # Maximum allowed ratio  (runtime_after / runtime_before).
  # A 2x slowdown is the ceiling; beyond that the cost is not justified
  # without an exceptional CRPS win.
  max_runtime_multiplier: 2.0

  # Minimum number of canonical slices whose CRPS must strictly improve
  # (by at least min_crps_improvement each).  Prevents anecdotal wins
  # on a single favourable dataset.
  min_slices_improved: 1

  # Walk-forward validation is mandatory.  If a variant shows retrieval
  # lift but walk-forward metrics do not confirm it, the result is
  # DISCARD regardless of other gates.
  walk_forward_required: true

logging:
  ledger_path: progress/autoresearch/experiments.jsonl
  schema_path: research/autoresearch/ledger/experiment-ledger.schema.json
  benchmark_id_field: jepa-retrieval-core-v1

notes:
  - Start retrieval-only. Do not wire JEPA into production ranking until the lane wins repeatedly.
  - Prefer frozen embeddings and cached artifacts before any online training or end-to-end integration.
