id: projector-calibration-core-v1
title: Forecast cone calibration lane
status: draft
owner: research
objective: >-
  Evaluate bounded projector and cone-shaping changes against walk-forward calibration and CRPS,
  without altering retrieval logic.

lane_type: projector_calibration

writable_scope:
  allowed:
    - research/autoresearch/
    - progress/autoresearch/
    - the_similarity/core/projector.py
    - the_similarity/tests/
  forbidden:
    - the_similarity/core/backtester.py
    - the_similarity/core/matcher.py
    - pyproject.toml

benchmark:
  dataset_family: historical price series with walk-forward validation
  canonical_slices:
    - id: equities-daily-core
      description: Daily equities slice for baseline calibration checks.
    - id: crypto-daily-core
      description: Higher-volatility slice for uncertainty width stress.
  query_window: 60
  forward_bars: 30
  top_k: 10
  n_trials: 100
  seeds:
    - 42
  evaluation_api: the_similarity.api.backtest
  no_lookahead_required: true

scorecard:
  primary_metrics:
    - name: crps
      direction: lower_is_better
    - name: calibration_error_p10_p90
      direction: lower_is_better
  secondary_metrics:
    - name: hit_rate
      direction: higher_is_better
    - name: runtime_seconds
      direction: lower_is_better

acceptance:
  keep_if:
    - condition: calibration improves with stable or better CRPS
  discard_if:
    - condition: cone changes look nicer but do not improve scorecard metrics

thresholds:
  # ── Numeric keep/discard gates ──────────────────────────────────────
  # Deterministic decision boundaries for the projector calibration lane.
  # Same design philosophy as jepa-retrieval-core-v1 thresholds.
  #
  # Baseline reference (from full run, seed 42):
  #   CRPS ≈ 0.1769 · calibration_error ≈ 0.0475 · hit_rate ≈ 0.49
  #   runtime ≈ 1 792 s

  min_calibration_improvement: 0.005
  # Minimum absolute reduction in calibration_error_p10_p90 vs.
  # baseline on the aggregate scorecard.

  max_crps_regression: 0.01
  # Maximum allowed absolute CRPS increase on any single canonical
  # slice.  Exceeding this is a severe regression.

  max_runtime_multiplier: 2.0
  # Maximum ratio of candidate runtime to baseline runtime.

  min_slices_improved: 1
  # Minimum number of canonical slices whose primary metric
  # (calibration_error_p10_p90) must strictly improve.

  min_hit_rate: 0.40
  # Absolute floor for hit_rate on any canonical slice.
  # If a candidate drops below this, it is discarded.

  walk_forward_required: true
  # Calibration gains must survive walk-forward validation.

logging:
  ledger_path: progress/autoresearch/experiments.jsonl
  schema_path: research/autoresearch/ledger/experiment-ledger.schema.json
  benchmark_id_field: projector-calibration-core-v1

notes:
  - Focus on projector/cone changes only. Do not alter retrieval or matching logic.
  - Prefer small, isolated ablations (e.g. one decay parameter at a time).
  - If calibration improves but CRPS worsens beyond the gate, investigate confidence intervals before discarding.
