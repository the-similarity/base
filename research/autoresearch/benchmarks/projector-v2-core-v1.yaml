id: projector-v2-core-v1
title: Projector v2 calibration-upgrade lane
status: active
owner: research
objective: >-
  Evaluate a new generation of projector variants (adaptive/change-aware conformal,
  regime-aware cone widening, joint-path sampling) against the current quantile
  cone, using CRPS / calibration-error / hit-rate / runtime on identical slices.

lane_type: projector_calibration_v2

# ---------------------------------------------------------------------------
# Write scope
# ---------------------------------------------------------------------------
# projector-v2 does NOT modify the existing projector.py; new modules are
# added under the_similarity/core/. Existing projector.py must remain byte-
# compatible with the baseline so that historical experiments stay reproducible.
writable_scope:
  allowed:
    - research/autoresearch/
    - progress/autoresearch/
    - the_similarity/core/projector_adaptive_conformal.py
    - the_similarity/core/projector_regime_aware.py
    - the_similarity/core/projector_joint_path.py
    - the_similarity/core/metrics.py
    - the_similarity/tests/
    - obsidian_thesim/concepts/
  forbidden:
    - the_similarity/core/projector.py      # baseline — do not modify
    - the_similarity/core/backtester.py
    - the_similarity/core/matcher.py
    - pyproject.toml

# ---------------------------------------------------------------------------
# Frozen evaluator — same slices and walk-forward contract as v1 lane
# ---------------------------------------------------------------------------
benchmark:
  dataset_family: historical price series with walk-forward validation
  canonical_slices:

    # Equities-daily-core slice (matches projector-calibration-core-v1 for
    # cross-lane comparability).
    - id: equities-daily-core
      description: Daily equities slice for baseline calibration checks.
      timeframe: 1d
      source: stooq
      symbols:
        - {symbol: spy, path: the-similarity-data/data/stocks/spy/1d.parquet}
        - {symbol: aapl, path: the-similarity-data/data/stocks/aapl/1d.parquet}

    # Crypto-daily-core slice — higher vol / fat tails stress test for
    # cone-width and conformal recalibration variants.
    - id: crypto-daily-core
      description: Higher-volatility slice for uncertainty width stress.
      timeframe: 1d
      source: ccxt
      symbols:
        - {symbol: btc_usdt, path: the-similarity-data/data/crypto/btc_usdt/1d.parquet}

  query_window: 60
  forward_bars: 30
  top_k: 10
  n_trials: 100
  seeds:
    - 42
  evaluation_api: the_similarity.api.backtest
  no_lookahead_required: true

# ---------------------------------------------------------------------------
# Variants evaluated in this lane
# ---------------------------------------------------------------------------
variants:
  - id: baseline_barwise_quantiles
    description: Existing projector.py weighted bar-wise quantile cone (reference).
    module: the_similarity.core.projector
  - id: adaptive_conformal
    description: Online/adaptive conformal calibration that adapts the conformal
      level to recent coverage errors via an OGD-style update.
    module: the_similarity.core.projector_adaptive_conformal
  - id: change_aware_conformal
    description: Change-aware variant that down-weights old calibration residuals
      when a distribution shift is detected in recent lookback.
    module: the_similarity.core.projector_adaptive_conformal
  - id: regime_aware_widening
    description: Regime-conditional cone widening — applies per-regime width
      multipliers learned from historical residuals.
    module: the_similarity.core.projector_regime_aware
  - id: joint_path
    description: Sample whole correlated forward paths from the match-path
      copula instead of independent per-bar quantiles.
    module: the_similarity.core.projector_joint_path

# ---------------------------------------------------------------------------
# Scorecard
# ---------------------------------------------------------------------------
scorecard:
  primary_metrics:
    - name: crps
      direction: lower_is_better
    - name: calibration_error_p10_p90
      direction: lower_is_better
  secondary_metrics:
    - name: hit_rate
      direction: higher_is_better
    - name: runtime_seconds
      direction: lower_is_better
    - name: calibration_error_over_time
      direction: lower_is_better
    - name: joint_path_crps
      direction: lower_is_better

acceptance:
  keep_if:
    - condition: CRPS or calibration_error_p10_p90 strictly improves on BOTH slices
      and no hard regression triggers
  discard_if:
    - condition: CRPS worsens by > 10% on any slice
    - condition: hit_rate drops below 0.45 on any slice
    - condition: runtime doubles without commensurate CRPS / calibration gain

# ---------------------------------------------------------------------------
# Numeric decision thresholds
# ---------------------------------------------------------------------------
thresholds:
  min_calibration_improvement: 0.005
  max_crps_regression: 0.01
  max_runtime_multiplier: 2.0
  min_slices_improved: 1
  walk_forward_required: true

logging:
  ledger_path: progress/autoresearch/experiments.jsonl
  schema_path: research/autoresearch/ledger/experiment-ledger.schema.json
  benchmark_id_field: projector-v2-core-v1
