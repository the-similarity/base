# ============================================================================
# Canonical benchmark slice catalogue — v1
# ============================================================================
#
# This file is the SINGLE SOURCE OF TRUTH for every benchmark slice that
# autoresearch lanes (retrieval_bench, projector calibration, foundation-
# model bench, report discipline, etc.) consume.  Every other slice spec
# in the repo should reference entries here by `id`, never duplicate the
# date window.
#
# ----------------------------------------------------------------------------
# Invariants (MUST NOT be violated by future edits)
# ----------------------------------------------------------------------------
# 1. APPEND-ONLY.  Once a slice `id` has landed on `main`, it MUST NOT be
#    renamed or deleted.  Every historical ledger row in
#    `progress/autoresearch/experiments.jsonl` references slice IDs and
#    renaming them silently invalidates the bench's longitudinal record.
#    If an entry becomes obsolete, mark it `status: deprecated` with a
#    `successor_id:` pointer and leave it in place.
# 2. DATES ARE REAL.  Every `start`/`end` pair must correspond to a real,
#    publicly known market event/window.  Do not fabricate dates to fit
#    a regime.  If you need a window that the dataset does not cover,
#    set `missing_data: true` so downstream runners can fall back to
#    synthetic data without pretending the raw series exists.
# 3. REGIME LABELS ARE AN ENUM.  The `regime_class` field is one of:
#        calm            — low realized vol, shallow drawdowns, drift
#        crisis          — tail-event drawdown or spike in realized vol
#        trend           — persistent directional move (bull OR bear)
#        mean_reverting  — range-bound oscillation around a level
#    These labels must exactly match the filename under `regimes/`.
# 4. NO SLICE ID COLLISIONS.  `validate.py` exits nonzero if any two
#    entries share an `id`.
# 5. CROSS-ASSET PAIRS have their own definition file in `cross_asset/`;
#    each pair references two catalogue slice IDs and a join rule.
#
# ----------------------------------------------------------------------------
# Schema per entry
# ----------------------------------------------------------------------------
# id:                   str  — stable identifier, kebab-case, never renamed
# asset:                str  — canonical symbol key used in the data catalog
# asset_class:          str  — equity_index | equity_single | crypto |
#                              commodity | forex | etf_sector
# dataset_path:         str  — path relative to `data_root` (the-similarity-data/data)
# timeframe:            str  — 1d | 1h | 4h | 15m | 5m | 1m
# start:                str  — ISO date, inclusive
# end:                  str  — ISO date, inclusive
# regime_class:         enum — one of {calm, crisis, trend, mean_reverting}
# description:          str  — 1-line human summary
# notes:                str  — known events in the window (Fed, earnings, etc.)
# min_bars:             int  — minimum bar count expected (default 200)
# missing_data:         bool — if true, dataset not resolvable; synth fallback expected
# status:               enum — active | deprecated (default active)
# successor_id:         str  — only set when status == deprecated
# source_bench_lane:    str  — lane that first introduced the slice, informational
# ============================================================================

version: 1
schema_revision: 1
data_root_default: the-similarity-data/data

# Allowed values for `regime_class` — validator enforces this set.
regime_classes:
  - calm
  - crisis
  - trend
  - mean_reverting

# Allowed values for `asset_class` — informational, validator warns on unknown.
asset_classes:
  - equity_index
  - equity_single
  - crypto
  - commodity
  - forex
  - etf_sector

