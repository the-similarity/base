project_name = "14"
worktree_root = "/Users/buyantogtokh/Projects"
base_ref = "origin/main"

[[agents]]
kind = "codex"
count = 2
command = "codex"
branch_prefix = "codex/task"

[[agents]]
kind = "claude"
count = 2
command = "claude"
branch_prefix = "claude/task"

[preview]
dashboard_port = 3999
# Uncomment to force extra PATH entries before auto-discovery (repo/worktree .venv, Poetry, nested dirs):
# path_prepend = [ "{repo_root}/custom/.venv/bin" ]

# Next.js frontend — browser-facing. Each agent gets port_base + offset (3000, 3001, ...).
[[preview.services]]
name = "web"
dir = "the-similarity-app"
port_base = 3000
command = "npm run dev -- --port {port}"
primary = true

[preview.services.env]
NEXT_PUBLIC_THE_SIMILARITY_API_URL = "http://127.0.0.1:8000"

# FastAPI backend — uses `{repo_root}/.venv/bin` when preview adds it to PATH (run `pip install -e .` in that venv).
[[preview.services]]
name = "api"
dir = "the-similarity-api"
port_base = 8000
command = "python -m uvicorn app.main:app --host 127.0.0.1 --port {port} --reload"

[preview.services.env]
PYTHONPATH = "{repo_root}"
THE_SIMILARITY_DATA_ROOT = "{repo_root}/the-similarity-data"
