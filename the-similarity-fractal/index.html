<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Similarity — Fractal Terrain</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      overflow: hidden;
    }
    canvas { display: block; }

    #controls {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(10, 10, 15, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 20px;
      width: 280px;
      z-index: 10;
    }
    #controls h1 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
      color: #fff;
    }
    #controls .subtitle {
      font-size: 11px;
      color: #666;
      margin-bottom: 16px;
    }

    .control-group {
      margin-bottom: 14px;
    }
    .control-group label {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #888;
      margin-bottom: 4px;
    }
    .control-group label span.value {
      color: #4fc3f7;
      font-weight: 600;
    }
    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: #4fc3f7;
      border-radius: 50%;
      cursor: pointer;
    }

    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }
    button {
      flex: 1;
      padding: 8px 12px;
      background: rgba(79, 195, 247, 0.1);
      border: 1px solid rgba(79, 195, 247, 0.3);
      border-radius: 6px;
      color: #4fc3f7;
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover {
      background: rgba(79, 195, 247, 0.2);
      border-color: rgba(79, 195, 247, 0.5);
    }
    button.active {
      background: rgba(79, 195, 247, 0.25);
      border-color: #4fc3f7;
    }

    #stats {
      position: fixed;
      bottom: 20px;
      left: 20px;
      font-size: 11px;
      color: #555;
    }

    #seed-display {
      font-size: 11px;
      color: #555;
      margin-top: 8px;
      text-align: center;
    }

    .separator {
      border: none;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      margin: 14px 0;
    }

    select {
      width: 100%;
      padding: 6px 8px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 11px;
      outline: none;
      cursor: pointer;
    }
    select option {
      background: #1a1a2e;
    }
  </style>
</head>
<body>
  <div id="controls">
    <h1>Fractal Terrain</h1>
    <div class="subtitle">self-similar subdivision</div>

    <div class="control-group">
      <label>Iterations <span class="value" id="val-iterations">5</span></label>
      <input type="range" id="iterations" min="0" max="8" value="5" step="1">
    </div>

    <div class="control-group">
      <label>Roughness <span class="value" id="val-roughness">0.55</span></label>
      <input type="range" id="roughness" min="0.1" max="1.0" value="0.55" step="0.05">
    </div>

    <div class="control-group">
      <label>Displacement <span class="value" id="val-displacement">1.20</span></label>
      <input type="range" id="displacement" min="0.1" max="3.0" value="1.2" step="0.1">
    </div>

    <div class="control-group">
      <label>Scale <span class="value" id="val-scale">4.0</span></label>
      <input type="range" id="scale" min="1.0" max="10.0" value="4.0" step="0.5">
    </div>

    <hr class="separator">

    <div class="control-group">
      <label>Color Map</label>
      <select id="colormap">
        <option value="terrain">Terrain (earth)</option>
        <option value="snow">Snow Peak</option>
        <option value="volcanic">Volcanic</option>
        <option value="ocean">Ocean Floor</option>
        <option value="alien">Alien World</option>
        <option value="mono">Monochrome</option>
      </select>
    </div>

    <div class="btn-row">
      <button id="btn-wireframe">Wireframe</button>
      <button id="btn-flat">Flat Shade</button>
    </div>
    <div class="btn-row">
      <button id="btn-animate">Animate</button>
      <button id="btn-regenerate">New Seed</button>
    </div>

    <div id="seed-display">seed: 0</div>
  </div>

  <div id="stats"></div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="src/app.js"></script>
</body>
</html>
